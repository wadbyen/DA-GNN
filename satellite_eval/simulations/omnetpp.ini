[General]
network = SatelliteNetwork
sim-time-limit = 100s
cpu-time-limit = 600s
**.numOrbits = 4
**.satsPerOrbit = 18
**.numGroundStations = 10
**.altitude = 550 km
**.stepDuration = 1s
**.zmqPort = 5555
**.episodeLength = 100
**.maxFlows = 50

# Link parameters (in C++ we set datarate = 10 Gbps)
**.SatelliteLink.datarate = 10Gbps

# Enable statistics
**.sat*.queue.packetQueueLength.record-histogram = true
**.sat*.queue.packetsDropped.record-histogram = true
**.controller.record-scalar = true